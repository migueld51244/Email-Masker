<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
  <title>Email Masker</title>
</head>
<body>
  <div class="container">
    <h1 class="headline">JavaScript Powered Email Masker</h1>
    <p class="info-p">Mask your email quick and easy by entering it into the box</p>
    <div class="data-area">
      <input type="email" id="email-area">
      <button class="submit-btn" type="button" id="submit">Mask my email!</button>
    </div>
    <div class="masked-result" aria-live="polite"></div>
  </div>

</body>
</html>
